<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — IP Course Finder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fdf8f3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,.09);
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #e35e1b, #f5a623);
    border-radius: 14px;
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
  }
  h1 { font-size: 1.3rem; font-weight: 700; color: #2d2d2d; margin-bottom: 6px; }
  .subtitle { font-size: .88rem; color: #7a6f67; margin-bottom: 28px; }
  .alert {
    padding: 10px 14px; border-radius: 7px; font-size: .85rem;
    margin-bottom: 18px; text-align: left;
    background: #fef2f2; color: #991b1b; border: 1px solid #fecaca;
  }
  label {
    display: block; text-align: left; font-size: .78rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px; color: #7a6f67; margin-bottom: 6px;
  }
  input[type="password"] {
    width: 100%; border: 1px solid #e8ddd4; border-radius: 7px;
    padding: 10px 13px; font-size: .95rem; color: #2d2d2d;
    outline: none; transition: border-color .15s; margin-bottom: 16px;
  }
  input[type="password"]:focus { border-color: #e35e1b; }
  button {
    width: 100%; padding: 11px;
    background: linear-gradient(135deg, #e35e1b, #f5a623);
    color: white; border: none; border-radius: 7px;
    font-size: .95rem; font-weight: 700; cursor: pointer; transition: opacity .15s;
  }
  button:hover { opacity: .88; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🌟</div>
  <h1>IP Course Finder</h1>
  <p class="subtitle">Art of Living · Intuition Process</p>
  {% if error %}
    <div class="alert">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Enter password" required autofocus />
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
