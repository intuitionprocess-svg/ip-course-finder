<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Intuition Process</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #fff;
    background-image: url(//d9hhrg4mnvzow.cloudfront.net/event.us.artofliving.org/us-en/lp1/intuition-process-journey/3fcbd58d-secrets-of-meditation_1000000000000000000028.png);
    background-repeat: no-repeat;
    background-position: center top;
    background-size: cover;
    overflow: hidden;
    position: relative;
    text-align: center;
    padding: 40px 20px;
  }

  /* Soft white overlay so text stays readable */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,.55);
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    max-width: 580px;
    width: 100%;
  }

  .logo {
    margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo img { height: 44px; width: auto; }

  .tagline {
    font-size: .93rem;
    font-style: italic;
    font-weight: 400;
    color: #7a5c54;
    margin-bottom: 28px;
    line-height: 1.55;
  }

  h1 {
    font-size: 2.8rem;
    font-weight: 700;
    color: #2e1f1a;
    line-height: 1.18;
    margin-bottom: 16px;
    letter-spacing: -.4px;
  }

  .sub {
    font-size: 1rem;
    font-weight: 400;
    color: #8a6a62;
    margin-bottom: 32px;
    line-height: 1.55;
  }

  .alert {
    padding: 10px 14px; border-radius: 9px; font-size: .84rem;
    margin-bottom: 16px; text-align: left;
    background: #fff0ee; color: #a03020; border: 1px solid #f8c8c0;
    max-width: 320px; margin-left: auto; margin-right: auto;
  }

  .form-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 52px;
    max-width: 320px;
    margin-left: auto;
    margin-right: auto;
  }

  input[type="password"] {
    width: 100%;
    border: 1.5px solid #e8cdc6;
    border-radius: 30px;
    padding: 13px 22px;
    font-size: .95rem;
    font-family: inherit;
    color: #3d2c28;
    background: rgba(255,255,255,.88);
    outline: none;
    transition: border-color .15s;
    text-align: center;
  }
  input[type="password"]:focus { border-color: #e8784a; }
  input[type="password"]::placeholder { color: #c4a89e; }

  button {
    width: 100%;
    padding: 13px 36px;
    background: linear-gradient(180deg, #ffd16f 0%, #ff865b 100%);
    color: #fff;
    border: none;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: .2px;
    box-shadow: 0 6px 20px rgba(255,134,91,.38);
    transition: opacity .15s, transform .1s;
  }
  button:hover  { opacity: .9; }
  button:active { transform: scale(.98); }

  .badges {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .88rem;
    font-weight: 400;
    color: #7a5c54;
  }
  .badge-icon { font-size: 1.15rem; }
</style>
</head>
<body>
<div class="content">
  <div class="logo">
    <img src="https://instituteofai.ai/wp-content/uploads/2025/11/iai_logo_black_text-scaled.webp" alt="Institute of Absolute Intelligence" />
  </div>

  <h1>Let's Continue Your<br>Intuition Process Journey</h1>

  <p class="sub">Find upcoming courses near you and<br>connect with your local teacher</p>

  {% if error %}
    <div class="alert">{{ error }}</div>
  {% endif %}

  <form method="POST" class="form-wrap">
    <input type="password" id="password" name="password" placeholder="Enter password" required autofocus />
    <button type="submit">Let's Begin!</button>
  </form>

  <div class="badges">
    <div class="badge">Calm mind</div>
    <div class="badge">Clear decisions</div>
    <div class="badge">Natural confidence</div>
  </div>
</div>
</body>
</html>
