<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Intuition Process</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fdf4ef;
    overflow: hidden;
    position: relative;
  }

  /* Watercolor blobs */
  body::before, body::after, .blob {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 520px; height: 520px;
    background: radial-gradient(circle, #f8c4b4 0%, transparent 70%);
    top: -120px; left: -120px;
    opacity: .75;
  }
  body::after {
    width: 460px; height: 460px;
    background: radial-gradient(circle, #fbd4b8 0%, transparent 70%);
    bottom: -100px; right: -100px;
    opacity: .7;
  }
  .blob {
    width: 380px; height: 380px;
    background: radial-gradient(circle, #fce8e0 0%, transparent 70%);
    top: 40%; left: 55%;
    opacity: .6;
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,.82);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.7);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(200,120,80,.12);
    padding: 44px 38px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  .logo {
    margin: 0 auto 22px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo img { height: 52px; width: auto; }

  h1 { font-size: 1.35rem; font-weight: 700; color: #3d2c28; margin-bottom: 2px; }
  .subtitle { font-size: 1.05rem; font-weight: 400; color: #b8907e; margin-bottom: 30px; }

  .alert {
    padding: 10px 14px; border-radius: 9px; font-size: .84rem;
    margin-bottom: 18px; text-align: left;
    background: #fff0ee; color: #a03020; border: 1px solid #f8c8c0;
  }

  label {
    display: block; text-align: left; font-size: .75rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .6px; color: #9a7d76; margin-bottom: 6px;
  }
  input[type="password"] {
    width: 100%;
    border: 1.5px solid #f0ddd8;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: .95rem;
    color: #3d2c28;
    background: rgba(255,255,255,.8);
    outline: none;
    transition: border-color .15s;
    margin-bottom: 18px;
  }
  input[type="password"]:focus { border-color: #e8784a; }
  input[type="password"]::placeholder { color: #c4a89e; }

  button {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, #f0a080 0%, #e8784a 100%);
    color: white; border: none; border-radius: 10px;
    font-size: .95rem; font-weight: 700; cursor: pointer;
    letter-spacing: .3px;
    box-shadow: 0 4px 14px rgba(232,120,74,.35);
    transition: opacity .15s, transform .1s;
  }
  button:hover  { opacity: .9; }
  button:active { transform: scale(.98); }
</style>
</head>
<body>
<div class="blob"></div>
<div class="card">
  <div class="logo"><img src="https://instituteofai.ai/wp-content/uploads/2025/11/iai_logo_black_text-scaled.webp" alt="Institute of Absolute Intelligence" /></div>
  <h1>Intuition Process</h1>
  <p class="subtitle">Course Finder</p>
  {% if error %}
    <div class="alert">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Enter password" required autofocus />
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
