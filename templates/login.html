<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Intuition Process</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #fdf4ef;
    overflow: hidden;
    position: relative;
    text-align: center;
    padding: 40px 20px;
  }

  /* Watercolor blobs */
  body::before {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    width: 600px; height: 600px;
    background: radial-gradient(circle, #f8c4b4 0%, transparent 65%);
    top: -180px; left: -160px;
    opacity: .7;
  }
  body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    width: 520px; height: 520px;
    background: radial-gradient(circle, #fce4d6 0%, transparent 65%);
    bottom: -140px; right: -140px;
    opacity: .65;
  }
  .blob-mid {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    pointer-events: none;
    z-index: 0;
    width: 420px; height: 420px;
    background: radial-gradient(circle, #fdeee8 0%, transparent 70%);
    top: 35%; left: 50%;
    transform: translateX(-50%);
    opacity: .55;
  }

  .content {
    position: relative;
    z-index: 1;
    max-width: 560px;
    width: 100%;
  }

  .logo {
    margin: 0 auto 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo img { height: 44px; width: auto; }

  .tagline {
    font-size: .92rem;
    font-style: italic;
    color: #b8907e;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  h1 {
    font-size: 2.6rem;
    font-weight: 700;
    color: #3d2c28;
    line-height: 1.2;
    margin-bottom: 16px;
    letter-spacing: -.5px;
  }

  .sub {
    font-size: 1rem;
    color: #a08880;
    margin-bottom: 36px;
    line-height: 1.5;
  }

  .alert {
    padding: 10px 14px; border-radius: 9px; font-size: .84rem;
    margin-bottom: 18px; text-align: left;
    background: #fff0ee; color: #a03020; border: 1px solid #f8c8c0;
  }

  .form-row {
    display: flex;
    gap: 0;
    max-width: 340px;
    margin: 0 auto 48px;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  input[type="password"] {
    width: 100%;
    border: 1.5px solid #f0ddd8;
    border-radius: 30px;
    padding: 13px 22px;
    font-size: .95rem;
    color: #3d2c28;
    background: rgba(255,255,255,.85);
    outline: none;
    transition: border-color .15s;
    text-align: center;
  }
  input[type="password"]:focus { border-color: #e8784a; }
  input[type="password"]::placeholder { color: #c4a89e; }

  button {
    width: 100%;
    padding: 13px 36px;
    background: linear-gradient(135deg, #f0a868 0%, #e8784a 100%);
    color: white; border: none; border-radius: 30px;
    font-size: .95rem; font-weight: 700; cursor: pointer;
    letter-spacing: .3px;
    box-shadow: 0 4px 18px rgba(232,120,74,.4);
    transition: opacity .15s, transform .1s;
  }
  button:hover  { opacity: .9; }
  button:active { transform: scale(.98); }

  .badges {
    display: flex;
    justify-content: center;
    gap: 36px;
    flex-wrap: wrap;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: .85rem;
    color: #a08880;
  }
  .badge-icon {
    font-size: 1.1rem;
  }
</style>
</head>
<body>
<div class="blob-mid"></div>
<div class="content">
  <div class="logo">
    <img src="https://instituteofai.ai/wp-content/uploads/2025/11/iai_logo_black_text-scaled.webp" alt="Institute of Absolute Intelligence" />
  </div>

  <p class="tagline">Thank you for attending the<br>Intuition Process Intro Session</p>

  <h1>Let's Continue Your<br>Intuition Process Journey</h1>

  <p class="sub">Find upcoming courses near you and<br>connect with your local teacher</p>

  {% if error %}
    <div class="alert">{{ error }}</div>
  {% endif %}

  <form method="POST" class="form-row">
    <input type="password" id="password" name="password" placeholder="Enter password" required autofocus />
    <button type="submit">Let's Begin!</button>
  </form>

  <div class="badges">
    <div class="badge"><span class="badge-icon">🌿</span> Calm mind</div>
    <div class="badge"><span class="badge-icon">✨</span> Clear decisions</div>
    <div class="badge"><span class="badge-icon">🌸</span> Natural confidence</div>
  </div>
</div>
</body>
</html>
