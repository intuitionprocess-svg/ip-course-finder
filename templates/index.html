<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intuition Process — Course Finder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --peach:  #e8784a;
    --pink:   #f0a080;
    --bg:     #fdf4ef;
    --white:  #ffffff;
    --border: #f0ddd8;
    --text:   #3d2c28;
    --muted:  #9a7d76;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; position: relative; }

  /* Subtle watercolor blobs in background */
  body::before {
    content: ''; position: fixed; z-index: 0; pointer-events: none;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, #f8c4b4 0%, transparent 65%);
    top: -200px; right: -150px; opacity: .45; filter: blur(40px);
  }
  body::after {
    content: ''; position: fixed; z-index: 0; pointer-events: none;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, #fbd4b8 0%, transparent 65%);
    bottom: -150px; left: -100px; opacity: .4; filter: blur(40px);
  }
  header, .controls, .statusbar, #nearest-banner, .layout { position: relative; z-index: 1; }

  /* Header */
  header { background: linear-gradient(135deg, #f0a080 0%, #e8784a 100%); color: #fff; padding: 18px 32px; box-shadow: 0 2px 12px rgba(232,120,74,.2); }
  header h1 { font-size: 1.55rem; font-weight: 700; }
  header p  { font-size: .88rem; opacity: .88; margin-top: 3px; }
  .header-logo { height: 36px; width: auto; filter: brightness(0) invert(1); opacity: .95; }

  /* Controls */
  .controls { background: rgba(255,255,255,.85); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .cg { display: flex; flex-direction: column; gap: 4px; }
  .cg label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .cg input, .cg select { border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 11px; font-size: .88rem; color: var(--text); background: rgba(255,255,255,.9); outline: none; min-width: 150px; transition: border-color .15s; }
  .cg input:focus, .cg select:focus { border-color: var(--peach); }
  .btn { padding: 9px 16px; border: none; border-radius: 8px; font-size: .88rem; font-weight: 600; cursor: pointer; transition: opacity .15s; align-self: flex-end; }
  .btn:hover { opacity: .85; }
  .btn-primary   { background: linear-gradient(135deg, #f0a080, #e8784a); color: #fff; box-shadow: 0 3px 10px rgba(232,120,74,.3); }
  .btn-secondary { background: #f5e8e2; color: var(--text); }

  /* Status bar */
  .statusbar { display: flex; align-items: center; gap: 8px; padding: 10px 32px; font-size: .83rem; color: var(--muted); background: rgba(255,255,255,.7); border-bottom: 1px solid var(--border); }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--peach); border-radius: 50%; animation: spin .7s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Nearest banner */
  #nearest-banner { display: none; background: #fff3ee; border-bottom: 1px solid #fbd4c0; padding: 9px 32px; font-size: .85rem; color: #7a3820; }
  #nearest-banner strong { color: var(--peach); }

  /* Layout */
  .layout { display: flex; min-height: calc(100vh - 160px); }

  /* Sidebar */
  .sidebar { width: 195px; flex-shrink: 0; border-right: 1px solid var(--border); background: rgba(255,255,255,.75); padding: 10px 0; position: sticky; top: 0; max-height: calc(100vh - 120px); overflow-y: auto; }
  .sidebar h3 { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); padding: 0 14px 7px; }
  .state-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 14px; cursor: pointer; font-size: .86rem; border-left: 3px solid transparent; transition: background .1s; }
  .state-item:hover { background: #fdf0eb; }
  .state-item.active { background: #fdf0eb; border-left-color: var(--peach); font-weight: 600; color: var(--peach); }
  .badge { font-size: .7rem; background: #f5e8e2; color: var(--muted); border-radius: 10px; padding: 1px 7px; font-weight: 700; }
  .state-item.active .badge { background: var(--peach); color: #fff; }

  /* Course area */
  .course-area { flex: 1; padding: 20px 26px; overflow-y: auto; }
  .state-section { margin-bottom: 30px; }
  .state-heading { display: flex; align-items: center; gap: 10px; margin-bottom: 13px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
  .state-heading h2 { font-size: 1rem; font-weight: 700; color: var(--text); }
  .state-count { font-size: .78rem; color: var(--muted); background: #f5e8e2; border-radius: 10px; padding: 2px 9px; }

  /* Cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(295px, 1fr)); gap: 13px; }
  .card { background: rgba(255,255,255,.85); border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 9px; transition: box-shadow .15s, transform .15s; backdrop-filter: blur(4px); }
  .card:hover { box-shadow: 0 6px 20px rgba(200,100,60,.1); transform: translateY(-1px); }
  .card.online { background: rgba(255,248,244,.9); border-color: #f8d4c4; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title { font-size: .9rem; font-weight: 700; line-height: 1.35; flex: 1; color: var(--text); }
  .tag { font-size: .66rem; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; border-radius: 5px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0; }
  .tag-online   { background: #dbeafe; color: #1d4ed8; }
  .tag-inperson { background: #dcfce7; color: #166534; }
  .tag-juniors  { background: #fce4f0; color: #9d174d; }
  .tag-kids     { background: #ede9fe; color: #5b21b6; }
  .tag-teens    { background: #dcfce7; color: #166534; }
  .tag-level2   { background: #fef3c7; color: #92400e; }

  .card-meta { display: flex; flex-direction: column; gap: 4px; font-size: .8rem; color: var(--muted); }
  .card-meta span { display: flex; align-items: flex-start; gap: 5px; }
  .icon { font-size: .85rem; flex-shrink: 0; }

  .dist-badge { font-size: .75rem; font-weight: 700; color: var(--peach); background: #fff3ee; border-radius: 5px; padding: 2px 8px; display: inline-block; align-self: flex-start; }

  .card-footer { margin-top: auto; display: flex; gap: 7px; flex-wrap: wrap; }
  .btn-sm { font-size: .78rem; padding: 5px 11px; border-radius: 6px; text-decoration: none; font-weight: 600; transition: opacity .15s; }
  .btn-sm:hover { opacity: .8; }
  .btn-reg  { background: linear-gradient(135deg, #f0a080, #e8784a); color: #fff; }
  .btn-info { background: #f5e8e2; color: var(--text); }

  /* Empty */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .emoji { font-size: 2.8rem; display: block; margin-bottom: 10px; }
  .empty h3 { font-size: 1.05rem; color: var(--text); margin-bottom: 6px; }

  /* Sign out link */
  .signout { color: rgba(255,255,255,.85); font-size:.82rem; text-decoration:none; border:1px solid rgba(255,255,255,.4); padding:5px 12px; border-radius:6px; transition: background .15s; }
  .signout:hover { background: rgba(255,255,255,.15); }

  /* Responsive */
  @media (max-width: 680px) {
    .controls, .statusbar, #nearest-banner { padding-left: 14px; padding-right: 14px; }
    .layout { flex-direction: column; }
    .sidebar { width: 100%; max-height: 180px; position: static; border-right: none; border-bottom: 1px solid var(--border); }
    .course-area { padding: 14px; }
    header { padding: 16px 14px; }
  }
</style>
</head>
<body>

<header>
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
    <div>
      <img src="https://instituteofai.ai/wp-content/uploads/2025/11/iai_logo_black_text-scaled.webp" alt="Institute of Absolute Intelligence" class="header-logo" />
      <h1>Intuition Process Course Finder</h1>
      <p>Find upcoming courses near you</p>
    </div>
    <a href="/logout" class="signout">Sign out</a>
  </div>
</header>

<div class="controls">
  <div class="cg">
    <label>Course Type</label>
    <select id="type-select">
      <option value="">All IP Courses</option>
      <option value="Intuition Process Juniors (ages 5–7)">Juniors (ages 5–7)</option>
      <option value="Intuition Process Kids (ages 8–12)">Kids (ages 8–12)</option>
      <option value="Intuition Process Teens (ages 13–17)">Teens (ages 13–17)</option>
      <option value="Intuition Process Level 2">Level 2</option>
    </select>
  </div>
  <div class="cg">
    <label>State</label>
    <select id="state-select"><option value="">All States</option></select>
  </div>
  <div class="cg">
    <label>City</label>
    <input type="text" id="city-input" placeholder="e.g. San Jose" />
  </div>
  <div class="cg">
    <label>From Date</label>
    <input type="date" id="date-input" />
  </div>
  <div class="cg">
    <label>Zip Code (find nearest)</label>
    <input type="text" id="zip-input" placeholder="e.g. 94103" maxlength="5" />
  </div>
  <button class="btn btn-primary"   id="zip-btn">Find Nearest</button>
  <button class="btn btn-secondary" id="clear-btn">Clear Filters</button>
</div>

<div class="statusbar">
  <div class="spinner" id="spinner"></div>
  <span id="status-text">Loading courses…</span>
</div>

<div id="nearest-banner"></div>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <h3>States</h3>
    <div id="state-list"></div>
  </nav>
  <main class="course-area" id="course-area">
    <div class="empty"><span class="emoji">🔄</span><h3>Fetching courses…</h3></div>
  </main>
</div>

<script>
// ── Haversine ──────────────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 3958.8, rad = Math.PI / 180;
  const dLat = (lat2 - lat1) * rad, dLng = (lng2 - lng1) * rad;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function fmtMi(n) { return n < 10 ? n.toFixed(1) + ' mi' : Math.round(n) + ' mi'; }

// ── State ──────────────────────────────────────────────────────────────────
let all = [], userLat = null, userLng = null, userCity = '', userState = '', activeState = '';

const spinner      = document.getElementById('spinner');
const statusText   = document.getElementById('status-text');
const courseArea   = document.getElementById('course-area');
const stateList    = document.getElementById('state-list');
const stateSelect  = document.getElementById('state-select');
const typeSelect   = document.getElementById('type-select');
const cityInput    = document.getElementById('city-input');
const dateInput    = document.getElementById('date-input');
const zipInput     = document.getElementById('zip-input');
const zipBtn       = document.getElementById('zip-btn');
const clearBtn     = document.getElementById('clear-btn');
const nearestBanner = document.getElementById('nearest-banner');

dateInput.value = new Date().toISOString().split('T')[0];

// ── Load ───────────────────────────────────────────────────────────────────
async function loadCourses() {
  spinner.style.display = 'block';
  statusText.textContent = 'Fetching courses…';
  try {
    const res  = await fetch(`/api/courses?from_date=${dateInput.value}`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    all = json.courses;
    buildDropdown();
    buildSidebar();
    render();
    statusText.textContent = `${all.length} courses loaded`;
  } catch(e) {
    statusText.textContent = 'Error: ' + e.message;
    courseArea.innerHTML = `<div class="empty"><span class="emoji">⚠️</span><h3>Could not load courses</h3><p>${e.message}</p></div>`;
  } finally {
    spinner.style.display = 'none';
  }
}

// ── Filter & group ─────────────────────────────────────────────────────────
function filtered() {
  const sf = (stateSelect.value || activeState).trim().toLowerCase();
  const cf = cityInput.value.trim().toLowerCase();
  const tf = typeSelect.value.trim().toLowerCase();
  return all.filter(c => {
    const cState = (c.state || '').toLowerCase();
    if (sf && cState !== sf) return false;
    if (cf && !(c.city || '').toLowerCase().includes(cf)) return false;
    if (tf && (c.course_type_name || '').toLowerCase() !== tf) return false;
    return true;
  });
}

function byState(courses) {
  const map = {};
  courses.forEach(c => {
    const s = c.state || 'Online / Unknown';
    (map[s] = map[s] || []).push(c);
  });
  return Object.entries(map).sort(([a],[b]) => {
    if (a === 'Online / Unknown') return 1;
    if (b === 'Online / Unknown') return -1;
    return a.localeCompare(b);
  });
}

// ── Card HTML ──────────────────────────────────────────────────────────────
// Course type → short label + colour class
const TYPE_TAG = {
  'Intuition Process Juniors (ages 5–7)':  ['Juniors 5–7',  'tag-juniors'],
  'Intuition Process Kids (ages 8–12)':    ['Kids 8–12',    'tag-kids'],
  'Intuition Process Teens (ages 13–17)':  ['Teens 13–17',  'tag-teens'],
  'Intuition Process Level 2':             ['Level 2',      'tag-level2'],
};

function cardHTML(c) {
  const online = c.is_online_event === 1 || /online/i.test(c.address || '');
  const venue  = online ? '<span class="tag tag-online">Online</span>' : '<span class="tag tag-inperson">In-Person</span>';
  const [typeLabel, typeCls] = TYPE_TAG[c.course_type_name] || [c.course_type_name || '', 'tag-inperson'];
  const typeTag = typeLabel ? `<span class="tag ${typeCls}">${typeLabel}</span>` : '';
  const tag    = typeTag || venue;
  const loc    = [c.city, c.state].filter(Boolean).join(', ') || c.address || '—';
  const timing = c.weekday_timings || c.weekend_timings || '';
  const recur  = c.recur_event_display ? `<span><span class="icon">🔁</span>${c.recur_event_display}</span>` : '';
  const teacher = c.facilitator_name || c.contact_name || '';

  let dist = '';
  if (userLat !== null && c.lat != null) {
    dist = `<span class="dist-badge">${fmtMi(haversine(userLat, userLng, c.lat, c.lng))}</span>`;
  }

  const detailLink = c.link
    ? `<a class="btn-sm btn-info" href="https://${c.link}" target="_blank">Details</a>` : '';
  const regLink = c.register_url
    ? `<a class="btn-sm btn-reg" href="${c.register_url}" target="_blank">Register</a>` : '';

  const fee = c.course_fee > 0 ? `<span><span class="icon">💰</span>$${c.course_fee}</span>` : '<span><span class="icon">💰</span>Free</span>';

  return `<div class="card${online ? ' online' : ''}">
    <div class="card-top"><div class="card-title">${c.title}</div>${tag}</div>
    <div class="card-meta">
      <span><span class="icon">📅</span>${c.display_date}${timing ? ' · ' + timing : ''}</span>
      <span><span class="icon">📍</span>${loc}</span>
      ${teacher ? `<span><span class="icon">👤</span>${teacher}</span>` : ''}
      ${fee}
      ${recur}
    </div>
    ${dist}
    <div class="card-footer">${regLink}${detailLink}</div>
  </div>`;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const courses = filtered();
  if (!courses.length) {
    courseArea.innerHTML = `<div class="empty"><span class="emoji">🔍</span><h3>No courses found</h3><p>Try adjusting your filters.</p></div>`;
    return;
  }

  const stateF = stateSelect.value || activeState;

  // Zip mode: show nearest 5 at top, then group by state
  if (userLat !== null && !stateF) {
    const sorted = [...courses].map(c => ({
      ...c, _d: c.lat != null ? haversine(userLat, userLng, c.lat, c.lng) : Infinity
    })).sort((a, b) => a._d - b._d);

    const nearest = sorted.slice(0, 5);
    let html = `<div class="state-section">
      <div class="state-heading"><h2>Nearest to ${userCity}${userState ? ', ' + userState : ''}</h2>
        <span class="state-count">${nearest.length} closest</span></div>
      <div class="cards">${nearest.map(cardHTML).join('')}</div>
    </div>`;

    for (const [state, cs] of byState(sorted.slice(5))) {
      html += sectionHTML(state, cs);
    }
    courseArea.innerHTML = html;
    return;
  }

  courseArea.innerHTML = byState(courses).map(([s, cs]) => sectionHTML(s, cs)).join('');
}

function sectionHTML(state, courses) {
  return `<div class="state-section" id="sec-${state.replace(/ /g,'-')}">
    <div class="state-heading">
      <h2>${state}</h2>
      <span class="state-count">${courses.length} course${courses.length !== 1 ? 's' : ''}</span>
    </div>
    <div class="cards">${courses.map(cardHTML).join('')}</div>
  </div>`;
}

// ── Sidebar & dropdown ─────────────────────────────────────────────────────
function buildSidebar() {
  const counts = {};
  all.forEach(c => { const s = c.state || 'Online / Unknown'; counts[s] = (counts[s]||0)+1; });
  const sorted = Object.entries(counts).sort(([a],[b]) => {
    if (a==='Online / Unknown') return 1; if (b==='Online / Unknown') return -1; return a.localeCompare(b);
  });

  stateList.innerHTML =
    item('', 'All States', all.length) +
    sorted.map(([s,n]) => item(s, s, n)).join('');

  stateList.querySelectorAll('.state-item').forEach(el => {
    el.addEventListener('click', () => {
      activeState = el.dataset.state;
      stateSelect.value = activeState;
      stateList.querySelectorAll('.state-item').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      render();
      if (activeState) {
        const sec = document.getElementById('sec-' + activeState.replace(/ /g,'-'));
        if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });
}

function item(val, label, count) {
  const active = (val === '' ? activeState==='' : activeState===val) ? ' active' : '';
  return `<div class="state-item${active}" data-state="${val}">
    <span>${label}</span><span class="badge">${count}</span>
  </div>`;
}

function buildDropdown() {
  const states = [...new Set(all.map(c => c.state).filter(Boolean))].sort();
  stateSelect.innerHTML = '<option value="">All States</option>' +
    states.map(s => `<option value="${s}">${s}</option>`).join('');
}

// ── Zip search ─────────────────────────────────────────────────────────────
zipBtn.addEventListener('click', async () => {
  const zip = zipInput.value.trim();
  if (!/^\d{5}$/.test(zip)) { alert('Enter a valid 5-digit zip code.'); return; }
  spinner.style.display = 'block';
  statusText.textContent = `Geocoding ${zip}…`;
  try {
    const res = await fetch(`/api/geocode/${zip}`);
    const geo = await res.json();
    if (geo.error) throw new Error(geo.error);
    userLat = geo.lat; userLng = geo.lng; userCity = geo.city; userState = geo.state;
    nearestBanner.style.display = 'block';
    nearestBanner.innerHTML = `Showing distances from <strong>${userCity}, ${userState} (${zip})</strong>`;
    statusText.textContent = `Location set: ${userCity}, ${userState}`;
    render();
  } catch(e) {
    alert('Zip lookup failed: ' + e.message);
  } finally {
    spinner.style.display = 'none';
  }
});

// ── Events ─────────────────────────────────────────────────────────────────
stateSelect.addEventListener('change', () => { activeState = stateSelect.value; buildSidebar(); render(); });
typeSelect.addEventListener('change', () => render());
cityInput.addEventListener('input', () => render());
dateInput.addEventListener('change', () => { userLat = null; nearestBanner.style.display='none'; loadCourses(); });
clearBtn.addEventListener('click', () => {
  stateSelect.value = ''; typeSelect.value = ''; cityInput.value = ''; zipInput.value = '';
  activeState = ''; userLat = null; userLng = null;
  nearestBanner.style.display = 'none';
  buildSidebar(); render();
});

loadCourses();
</script>
</body>
</html>
